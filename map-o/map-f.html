    <script>
(function () {
    var svg = document.getElementById('map-svg');
    if (!svg) return;

    var W = 2473;
    var H = 1277;
    var AR = W / H;
    var minW = 32;

    var vb = svg.viewBox.baseVal;
    var vx = vb.x;
    var vy = vb.y;
    var vw = vb.width;
    var vh = vb.height;

    function applyViewBox() {
        svg.setAttribute('viewBox', vx + ' ' + vy + ' ' + vw + ' ' + vh);
    }

    function clampView() {
        if (vw >= W - 1e-6) {
            vx = 0;
            vy = 0;
            vw = W;
            vh = H;
            return;
        }
        if (vw < minW) {
            vw = minW;
            vh = minW / AR;
        }
        if (vx < 0) vx = 0;
        if (vy < 0) vy = 0;
        if (vx + vw > W) vx = W - vw;
        if (vy + vh > H) vy = H - vh;
    }

    function clientToSvg(cx, cy) {
        var pt = svg.createSVGPoint();
        pt.x = cx;
        pt.y = cy;
        var ctm = svg.getScreenCTM();
        if (!ctm) return null;
        return pt.matrixTransform(ctm.inverse());
    }

    var dragging = false;
    var lastCX = 0;
    var lastCY = 0;

    function endPan() {
        if (!dragging) return;
        dragging = false;
        svg.classList.remove('is-panning');
    }

    svg.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        dragging = true;
        lastCX = e.clientX;
        lastCY = e.clientY;
        svg.classList.add('is-panning');
        e.preventDefault();
    });

    window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        e.preventDefault();
        var w0 = clientToSvg(lastCX, lastCY);
        var w1 = clientToSvg(e.clientX, e.clientY);
        if (!w0 || !w1) return;
        vx -= w1.x - w0.x;
        vy -= w1.y - w0.y;
        lastCX = e.clientX;
        lastCY = e.clientY;
        clampView();
        applyViewBox();
    });

    window.addEventListener('mouseup', endPan);
    window.addEventListener('blur', endPan);

    svg.addEventListener('wheel', function (e) {
        e.preventDefault();

        var z = Math.exp(-e.deltaY * 0.0015);
        if (z === 1) return;

        var pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        var ctm = svg.getScreenCTM();
        if (!ctm) return;
        var p = pt.matrixTransform(ctm.inverse());
        var wx = Math.max(0, Math.min(W, p.x));
        var wy = Math.max(0, Math.min(H, p.y));

        var nvw = vw / z;
        var nvh = vh / z;
        if (nvw > W) {
            nvw = W;
            nvh = H;
        }
        if (nvw < minW) {
            nvw = minW;
            nvh = minW / AR;
        }

        var u = (wx - vx) / vw;
        var v = (wy - vy) / vh;
        vx = wx - u * nvw;
        vy = wy - v * nvh;
        vw = nvw;
        vh = nvh;

        clampView();
        applyViewBox();
    }, { passive: false });
